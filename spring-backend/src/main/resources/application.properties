########################################
## Logging
########################################
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Server port
server.port=8080

# Mail Configuration (Brevo HTTP API — SMTP ports blocked on this network)
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=Credit Card Issuer

# Cerebras AI Chat
cerebras.api.key=${CEREBRAS_API_KEY}
cerebras.api.url=https://api.cerebras.ai/v1/chat/completions
cerebras.model=qwen-3-235b-a22b-instruct-2507

########################################
## Field-Level Encryption (AES-256-GCM)
########################################
# 256-bit key as 64 hex characters — keep this secret!
# Sensitive fields (card number, CVV, ID number, phone number) are encrypted at rest.
encryption.aes.key=${ENCRYPTION_AES_KEY}