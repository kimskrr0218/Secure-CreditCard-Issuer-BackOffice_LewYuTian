<app-top-navbar></app-top-navbar>

<div class="page-container">
  <div class="page-header">
    <h2>View Customer</h2>
  </div>

  <div class="card add-customer-card" *ngIf="customer">
      
      <!-- Personal Information -->
      <div class="form-section">
        <h3>Personal Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" [value]="customer?.firstName || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" [value]="customer?.lastName || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <input type="text" [value]="customer?.gender || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Nationality</label>
            <input type="text" [value]="customer?.nationality || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" [value]="customer?.companyName || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="text" [value]="customer?.dob || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Identification Number</label>
            <input type="text" [value]="customer?.maskedIdNumber || '-'" readonly>
          </div>
        </div>
      </div>

      <!-- Contact Information -->
      <div class="form-section">
        <h3>Contact Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Email</label>
            <input type="email" [value]="customer?.email || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" [value]="customer?.maskedPhoneNumber || '-'" readonly>
          </div>
        </div>
      </div>

      <!-- Address Information -->
      <div class="form-section">
        <h3>Address Information</h3>
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Home Address</label>
            <input type="text" [value]="customer?.homeAddress || '-'" readonly>
          </div>
        </div>
      </div>

      <!-- Financial Information -->
      <div class="form-section">
        <h3>Financial Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Employment Status</label>
            <input type="text" [value]="customer?.employmentStatus || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Gross Annual Income</label>
            <input type="text" [value]="customer?.annualIncome || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Employer Name</label>
            <input type="text" [value]="customer?.employerName || '-'" readonly>
          </div>
        </div>
      </div>

      <!-- Audit Trail -->
      <div class="form-section" *ngIf="customer?.createdBy || customer?.approvedBy || customer?.updatedBy">
        <h3>Audit Trail</h3>
        <div class="form-grid">
          <div class="form-group" *ngIf="customer?.createdBy">
            <label>Created By</label>
            <input type="text" [value]="customer.createdBy" readonly>
          </div>
          <div class="form-group" *ngIf="customer?.createdAt">
            <label>Created At</label>
            <input type="text" [value]="customer.createdAt | date:'dd/MM/yyyy'" readonly>
          </div>
          <div class="form-group" *ngIf="customer?.approvedBy">
            <label>Approved By</label>
            <input type="text" [value]="customer.approvedBy" readonly>
          </div>
          <div class="form-group" *ngIf="customer?.updatedBy">
            <label>Last Updated By</label>
            <input type="text" [value]="customer.updatedBy" readonly>
          </div>
          <div class="form-group" *ngIf="customer?.updatedAt">
            <label>Last Updated At</label>
            <input type="text" [value]="customer.updatedAt | date:'dd/MM/yyyy'" readonly>
          </div>
          <div class="form-group" *ngIf="customer?.rejectedBy">
            <label>Rejected By</label>
            <input type="text" [value]="customer.rejectedBy" readonly>
          </div>
        </div>
      </div>

      <!-- Rejected Reason Section -->
      <div class="rejection-reason" *ngIf="requestStatus === 'REJECTED'">
        <h3>Rejected Reason</h3>
        <p>{{ rejectionReason }}</p>
      </div>

      <!-- Request Info Section (from Pending page) -->
      <div class="request-info" *ngIf="pendingRequest">
        <h3>Request Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Operation</label>
            <input type="text" [value]="pendingRequest.operation || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Requested By</label>
            <input type="text" [value]="pendingRequest.createdBy || '-'" readonly>
          </div>
          <div class="form-group">
            <label>Approval Status</label>
            <input type="text" [value]="pendingRequest.status || '-'" readonly>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="goBack()">{{ backLabel }}</button>
        <ng-container *ngIf="canApproveReject">
          <button type="button" class="approve-btn" (click)="approve()">Approve</button>
          <button type="button" class="reject-btn" (click)="openRejectModal()">Reject</button>
        </ng-container>
      </div>

  </div>
</div>

<!-- ================= REJECT MODAL ================= -->
<div *ngIf="showRejectModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Reject Request</h3>
      <button class="close-btn" (click)="closeRejectModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Enter rejection reason:</label>
        <textarea
          [(ngModel)]="rejectReason"
          rows="4"
          placeholder="Reason is required to reject..."
        ></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" (click)="closeRejectModal()">Cancel</button>
      <button class="modal-submit-btn" (click)="confirmReject()" [disabled]="!rejectReason.trim()">Confirm Rejection</button>
    </div>
  </div>
</div>

<!-- ================= MESSAGE MODAL ================= -->
<div *ngIf="showMessageModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Message</h3>
      <button class="close-btn" (click)="closeMessage()">&times;</button>
    </div>
    <p style="padding: 0 20px;">{{ modalMessage }}</p>
    <div class="modal-actions">
      <button class="modal-submit-btn" (click)="closeMessage()">OK</button>
    </div>
  </div>
</div>
