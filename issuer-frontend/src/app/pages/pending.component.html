<app-top-navbar></app-top-navbar>

<div class="page-container">

  <!-- ================= HEADER ================= -->
  <div class="page-header">
    <h2>Tasks</h2>
  </div>

  <div class="content-layout">

    <!-- ================= FILTER PANEL ================= -->
    <div class="filter-panel card-panel">
      <h3>Search</h3>

      <div class="filter-group">
        <label>Task ID</label>
        <input type="text" [(ngModel)]="filterTaskId" placeholder="e.g. 12" />
      </div>

      <div class="filter-group">
        <label>Keyword</label>
        <input type="text" [(ngModel)]="filterKeyword" placeholder="Name, No, Operation..." />
      </div>

      <div class="filter-actions">
        <button class="clear-btn" (click)="clearFilters()">
          <span>CLEAR</span>
        </button>
        <button class="search-btn" (click)="triggerSearch()">
          <span>SEARCH</span>
        </button>
      </div>
    </div>

    <!-- ================= MAIN SECTION ================= -->
    <div class="main-section">

      <!-- ================= ENTITY TYPE FILTER ================= -->
      <div class="filter-toolbar">
        <span class="filter-label">Type:</span>
        <button class="filter-btn" [class.active]="entityFilter === 'ALL'" (click)="setEntityFilter('ALL')">All</button>
        <button class="filter-btn" [class.active]="entityFilter === 'CUSTOMER'" (click)="setEntityFilter('CUSTOMER')">Customer</button>
        <button class="filter-btn" [class.active]="entityFilter === 'ACCOUNT'" (click)="setEntityFilter('ACCOUNT')">Account</button>
        <button class="filter-btn" [class.active]="entityFilter === 'CARD'" (click)="setEntityFilter('CARD')">Card</button>

        <span class="filter-separator"></span>

        <span class="filter-label">Status:</span>
        <button class="filter-btn" [class.active]="currentFilter === 'ALL'" (click)="setFilter('ALL')">All</button>
        <button class="filter-btn" [class.active]="currentFilter === 'PENDING'" (click)="setFilter('PENDING')">Pending</button>
        <button class="filter-btn" [class.active]="currentFilter === 'APPROVED'" (click)="setFilter('APPROVED')">Approved</button>
        <button class="filter-btn" [class.active]="currentFilter === 'REJECTED'" (click)="setFilter('REJECTED')">Rejected</button>
      </div>

      <!-- ================= UNIFIED TASKS TABLE ================= -->
      <div class="requests-container">
        <div *ngIf="filteredTasks.length > 0; else noTasks">
          <table class="request-table">
            <thead>
              <tr>
                <th>No.</th>
                <th>Task ID</th>
                <th>Type</th>
                <th>Operation</th>
                <th>Approval Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let r of filteredTasks; let i = index">
                <td>{{ i + 1 }}</td>
                <td>{{ r.id }}</td>

                <!-- ENTITY TYPE -->
                <td>
                  <span class="badge entity-badge" [ngClass]="{
                    'entity-customer': r.entityType === 'CUSTOMER',
                    'entity-account': r.entityType === 'ACCOUNT',
                    'entity-card': r.entityType === 'CARD'
                  }">
                    {{ r.entityType }}
                  </span>
                </td>

                <!-- OPERATION -->
                <td>
                  <span class="badge" [ngClass]="{
                    'active': r.operation === 'CREATE' || r.operation === 'ACTIVATE',
                    'inactive': r.operation === 'DEACTIVATE' || r.operation === 'DELETE',
                    'blocked': r.operation === 'BLOCK',
                    'issued': r.operation === 'ISSUE',
                    'pending': r.operation === 'UPDATE' || r.operation === 'REPLACE' || r.operation === 'UNBLOCK'
                  }">
                    {{ r.operation }}
                  </span>
                </td>

                <!-- APPROVAL STATUS -->
                <td>
                  <span class="badge" [ngClass]="{
                    'pending': r.status === 'PENDING',
                    'approved': r.status === 'APPROVED',
                    'rejected': r.status === 'REJECTED'
                  }">
                    {{ r.status }}
                  </span>
                </td>

                <!-- ACTION -->
                <td>
                  <button class="view-btn" (click)="viewTask(r)">View</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <ng-template #noTasks>
          <div class="empty-state">
            <p>No tasks found for the selected filters.</p>
          </div>
        </ng-template>
      </div>

    </div> <!-- end main-section -->
  </div> <!-- end content-layout -->

</div>

<!-- ================= REJECT MODAL ================= -->
<div *ngIf="showRejectModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Reject Request</h3>
      <button class="close-btn" (click)="closeRejectModal()">&times;</button>
    </div>

    <div class="modal-body">
      <div class="form-row">
        <label>Enter rejection reason:</label>
        <textarea
          [(ngModel)]="rejectReason"
          rows="4"
          placeholder="Reason is required to reject..."
        ></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="cancel-btn" (click)="closeRejectModal()">Cancel</button>
      <button
        class="submit-btn"
        (click)="confirmReject()"
        [disabled]="!rejectReason.trim()"
      >
        Confirm Rejection
      </button>
    </div>
  </div>
</div>

<!-- ================= MESSAGE MODAL ================= -->
<div *ngIf="showMessageModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Message</h3>
      <button class="close-btn" (click)="closeMessage()"></button>
    </div>
    <p>{{ modalMessage }}</p>
    <div class="modal-actions">
      <button class="submit-btn" (click)="closeMessage()">OK</button>
    </div>
  </div>
</div>
